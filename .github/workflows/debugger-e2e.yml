name: Debugger E2E

# Real end-to-end acceptance tests that drive the native low-level debugger
# backends against a freshly-built target: ptrace on linux/amd64, a pure-Mach
# exception-port model on darwin/arm64. Unlike the default `go test ./...` (which
# exercises only the in-process fakeBackend), these launch a real process and
# step it through the actual OS backend, so they need a real kernel and run on
# native GitHub-hosted runners. Gated behind the `e2e` build tag; the Ginkgo
# suite lives in ./test/integration and is split via Ginkgo labels into `basic`
# (correctness), `churn` (multi-thread robustness), `pause` (async interrupt /
# manual stop), `stepping` (StepInto/StepOut), `inspect`
# (StackFrames/Locals/Goroutines), `breakpoints` (ClearBreakpoint), `kill`
# (kill-while-running), `exit` (process exit status), `restart`, and `fullstack`
# (operations driven through the whole client → WebSocket → hub → debugger stack).
#
# Both linux and darwin run the full set. The step-off-an-armed-trap specs
# (basic, stepping, breakpoints, churn) and kill (kill-while-running) used to be
# LINUX-ONLY because they were unreliable under the old darwin wait4/ptrace model;
# the Mach-exception rearchitecture (#92) — per-thread exception delivery plus a
# target-side I-cache flush on breakpoint writes plus a wait4-free kill — closed
# those gaps, so they now run on darwin as well. See AGENTS.md → Test layering.
#
# The linux jobs run fully on hosted runners. The darwin jobs compile and
# codesign the E2E binary on hosted macOS runners (the only CI coverage that the
# darwin backend even builds), but *execution* is gated to self-hosted runners:
# Apple's Sonoma (macOS 14) security model blocks task_for_pid on GitHub-hosted
# runners even with the debugger entitlement, so the Mach backend can't attach
# there. Run the darwin E2E locally on real hardware via `just e2e-darwin`.

on:
  pull_request:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-amd64:
    name: Linux amd64 (ptrace)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Confirm native target
        run: test "$(go env GOOS)/$(go env GOARCH)" = "linux/amd64"

      - name: Show ptrace policy
        run: cat /proc/sys/kernel/yama/ptrace_scope || true

      - name: E2E basic (continue + step-over correctness)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=basic

      - name: E2E churn (multi-thread robustness)
        run: go test -tags e2e -race -count=1 -v -timeout 600s ./test/integration -ginkgo.label-filter=churn

      - name: E2E pause (async interrupt)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=pause

      - name: E2E stepping (StepInto / StepOut)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=stepping

      - name: E2E inspect (StackFrames / Locals / Goroutines)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=inspect

      - name: E2E breakpoints (ClearBreakpoint)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=breakpoints

      - name: E2E kill (kill-while-running)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=kill

      - name: E2E exit (process exit status)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=exit

      - name: E2E attach (attach to a running process)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter=attach

  darwin-arm64:
    name: Darwin arm64 (Mach exceptions)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Confirm native target
        run: test "$(go env GOOS)/$(go env GOARCH)" = "darwin/arm64"

      # task_for_pid needs the com.apple.security.cs.debugger entitlement, so the
      # test binary must be codesigned before it runs. Compile first, sign, run.
      # This compile+codesign is the only CI coverage that the darwin backend and
      # E2E suite even build — the unit-test job on ubuntu compiles only the
      # linux backend.
      - name: Build and codesign the E2E test binary
        run: |
          CGO_ENABLED=1 go test -tags 'e2e bingonative' -race -c -o e2e.test ./test/integration
          codesign --sign - --entitlements entitlements.plist --force e2e.test
          codesign -d --entitlements - e2e.test || true

      # Apple's Sonoma (macOS 14) security model blocks task_for_pid on
      # GitHub-hosted runners even with the debugger entitlement — the call hangs
      # in the kernel, so the Mach backend can never run here. Execution is gated
      # to self-hosted runners; hosted runners stop after the compile+codesign
      # above. Delve hits the identical wall. Run locally via `just e2e-darwin`.
      # Each label runs as its own step so a failure is attributable at a glance;
      # this mirrors the linux backend job (minus fullstack/restart, which run in
      # the fullstack-darwin-arm64 job).
      - name: E2E basic (continue + step-over correctness)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=basic

      - name: E2E stepping (StepInto / StepOut)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=stepping

      - name: E2E breakpoints (ClearBreakpoint)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=breakpoints

      - name: E2E churn (multi-thread robustness)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 600s -ginkgo.label-filter=churn

      - name: E2E pause (async interrupt)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=pause

      - name: E2E inspect (StackFrames / Locals / Goroutines)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=inspect

      - name: E2E kill (kill-while-running)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=kill

      - name: E2E exit (process exit status)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=exit

      - name: E2E attach (attach to a running process)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=attach

      - name: E2E hygiene (Mach port-right leak regression)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter=hygiene

      - name: Skip execution on hosted runners (task_for_pid unavailable)
        if: runner.environment != 'self-hosted'
        run: |
          echo "SKIPPED: task_for_pid is blocked on GitHub-hosted macOS runners (Apple Sonoma restriction)."
          echo "The darwin backend + E2E binary compiled and codesigned successfully above."
          echo "Run the full darwin backend E2E locally on real hardware: just e2e-darwin"

  fullstack-linux-amd64:
    name: Full-stack Linux amd64 (client → WS → hub → ptrace)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Confirm native target
        run: test "$(go env GOOS)/$(go env GOARCH)" = "linux/amd64"

      - name: Show ptrace policy
        run: cat /proc/sys/kernel/yama/ptrace_scope || true

      # Boots a real server on an ephemeral port, connects the real pkg/client
      # over a real WebSocket, and drives continue/pause/setBreakpoint through
      # the whole stack down to the real ptrace backend. `restart` exercises the
      # hub-level kill+relaunch+breakpoint-reinstall path through the same stack.
      - name: E2E full-stack + restart (transport wiring over the real backend)
        run: go test -tags e2e -race -count=1 -v -timeout 300s ./test/integration -ginkgo.label-filter='fullstack || restart'

  fullstack-darwin-arm64:
    name: Full-stack Darwin arm64 (client → WS → hub → Mach)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Confirm native target
        run: test "$(go env GOOS)/$(go env GOARCH)" = "darwin/arm64"

      # The tracee is spawned by the server's debugger, which still needs the
      # com.apple.security.cs.debugger entitlement — so the test binary must be
      # codesigned before it runs. Compile first, sign, run.
      - name: Build and codesign the E2E test binary
        run: |
          CGO_ENABLED=1 go test -tags 'e2e bingonative' -race -c -o e2e.test ./test/integration
          codesign --sign - --entitlements entitlements.plist --force e2e.test
          codesign -d --entitlements - e2e.test || true

      # Same Sonoma task_for_pid restriction as the backend darwin job: the Mach
      # backend can't attach on hosted runners, so execution is gated to
      # self-hosted runners. Hosted runners stop after the compile+codesign above.
      - name: E2E full-stack + restart (self-hosted runners only)
        if: runner.environment == 'self-hosted'
        run: ./e2e.test -test.v -test.timeout 300s -ginkgo.label-filter='fullstack || restart'

      - name: Skip execution on hosted runners (task_for_pid unavailable)
        if: runner.environment != 'self-hosted'
        run: |
          echo "SKIPPED: task_for_pid is blocked on GitHub-hosted macOS runners (Apple Sonoma restriction)."
          echo "The darwin backend + E2E binary compiled and codesigned successfully above."
          echo "Run the full-stack darwin E2E locally on real hardware: just e2e-darwin"
