name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN_NAME="bingo_${GOOS}_${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "dist/${BIN_NAME}" ./cmd/bingo

      - name: Package artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p release
          ASSET_BASE="bingo_${GOOS}_${GOARCH}"
          tar -C dist -czf "release/${ASSET_BASE}.tar.gz" "${ASSET_BASE}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
