# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["dev", "main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Check imports formatting
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          unformatted=$(goimports -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need goimports formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0

      - name: Build
        run: go build -v ./...

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Test
        run: go test -v ./...

  docs:
    name: API docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      # Mirrors `just docs-check`: fails if the committed Markdown API reference
      # under docs/api/ has drifted from the packages' doc comments. Regenerate
      # with `just docs` and commit the result.
      - name: Check generated API reference is in sync
        run: |
          go tool gomarkdoc --check --output docs/api/protocol.md ./pkg/protocol
          go tool gomarkdoc --check --output docs/api/client.md ./pkg/client
